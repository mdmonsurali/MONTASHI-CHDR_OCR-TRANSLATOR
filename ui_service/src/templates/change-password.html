<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MONTASHI-OCR-TRANSLATOR · Change password</title>
  <link rel="stylesheet" href="/static/style.css?v=9" />
</head>
<body>

<div class="topbar">
  <span class="logo">MONTASHI-OCR-TRANSLATOR</span>
  <nav class="topbar-nav">
    <a href="/logout" class="nav-link">Log out</a>
  </nav>
</div>

<main class="auth-shell">
  <form class="auth-card" method="POST" action="/change-password" autocomplete="off">
    <h1>Change password</h1>
    <p class="auth-sub">Choose a new password (8+ characters).</p>

    <div id="auth-error" class="auth-error" hidden></div>

    <label class="auth-label" for="current_password">Current password</label>
    <input class="auth-input" type="password" id="current_password" name="current_password"
           autocomplete="current-password" required autofocus />

    <label class="auth-label" for="new_password">New password</label>
    <input class="auth-input" type="password" id="new_password" name="new_password"
           autocomplete="new-password" minlength="8" required />

    <label class="auth-label" for="confirm_password">Confirm new password</label>
    <input class="auth-input" type="password" id="confirm_password" name="confirm_password"
           autocomplete="new-password" minlength="8" required />

    <button class="auth-btn" type="submit">Update password</button>
  </form>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const err = params.get("err");
  if (err) {
    const box = document.getElementById("auth-error");
    box.textContent = decodeURIComponent(err);
    box.hidden = false;
  }
  document.querySelector("form").addEventListener("submit", (e) => {
    const np = document.getElementById("new_password").value;
    const cp = document.getElementById("confirm_password").value;
    if (np !== cp) {
      e.preventDefault();
      const box = document.getElementById("auth-error");
      box.textContent = "New password and confirmation do not match.";
      box.hidden = false;
    }
  });
</script>
</body>
</html>
